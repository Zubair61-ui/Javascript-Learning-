<script>
    const sayDate = function(str){
        console.log(str, Date.now());
    }

    // Keep track of the interval ID globally so both buttons can access it
    let intervalId; 

    // Start printing every second when 'Start' is clicked
    document.querySelector('#start').addEventListener('click', functionName => {
        // Prevent multiple intervals from running at the same time if clicked repeatedly
        if (!intervalId) { 
            intervalId = setInterval(sayDate, 1000, "hi");
            console.log("STARTED");
        }
    })

    // Stop printing when 'Stop' is clicked
    document.querySelector('#stop').addEventListener('click', function(){
        clearInterval(intervalId);
        intervalId = null; // Reset the variable
        console.log("STOPPED");
    })
</script>
